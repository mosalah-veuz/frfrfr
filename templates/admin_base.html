{% extends "base.html" %}
{% block body %}
<div class="admin-layout">
  <aside class="sidebar">
    <div class="sidebar-brand">
      <span class="brand-icon">◈</span>
      <span class="brand-name">EventHub</span>
    </div>
    <nav class="sidebar-nav">
      <a href="{% url 'admin_dashboard' %}" class="nav-item {% if request.resolver_match.url_name == 'admin_dashboard' %}active{% endif %}">
        <span class="nav-icon">▦</span> Dashboard
      </a>
      <a href="{% url 'ticket_list' %}" class="nav-item {% if 'ticket' in request.resolver_match.url_name %}active{% endif %}">
        <span class="nav-icon">◻</span> Tickets
      </a>
      <a href="{% url 'registration_list' %}" class="nav-item {% if 'registration' in request.resolver_match.url_name %}active{% endif %}">
        <span class="nav-icon">◈</span> Registrations
      </a>
      <a href="{% url 'activity_log_list' %}" class="nav-item {% if 'activity' in request.resolver_match.url_name %}active{% endif %}">
        <span class="nav-icon">◎</span> Activity Logs
      </a>
    </nav>
    <div class="sidebar-footer">
      <span class="admin-name">{{ request.user.username }}</span>
      <a href="{% url 'admin_logout' %}" class="logout-btn">Sign out</a>
    </div>
  </aside>
  <main class="admin-main">
    <div class="admin-content">
      {% if messages %}
        {% for message in messages %}
          <div class="alert alert-{{ message.tags }}">{{ message }}</div>
        {% endfor %}
      {% endif %}
      {% block admin_content %}{% endblock %}
    </div>
  </main>
</div>
{% endblock %}
